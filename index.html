<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zhao Wang — Transport Data Scientist</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
<style>
  html { scroll-behavior: smooth; scroll-padding-top: 84px; background-color: var(--surface-page); }
  html body {
    background-color: var(--surface-page);
    background-image: linear-gradient(var(--divider) 1px, transparent 1px), linear-gradient(90deg, var(--divider) 1px, transparent 1px);
    background-size: 64px 64px;
    min-height: 100vh;
    transition: background-color var(--dur-base) var(--ease-out);
  }
  @keyframes zwBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .zw-caret { animation: zwBlink 1.05s steps(1) infinite; }
  @media (prefers-reduced-motion: reduce) { .zw-caret { animation: none; } }
  @media (max-width: 880px) {
    .hero-grid { grid-template-columns: 1fr !important; }
    .hero-grid figure { order: -1; }
    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 1.5rem 1rem !important; }
    .about-grid { grid-template-columns: 1fr !important; }
    .nav-links a:not(:last-child) { display: none; }
  }
  @media (max-width: 560px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
</style>
